openapi: 3.0.0
info:
  title: Pet Store
  description: a tiny example OpenAPI document that clic can run directly
servers:
  - url: https://petstore.example.com/v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
paths:
  /pets:
    get:
      summary: list all pets
      parameters:
        - name: limit
          in: query
          description: maximum number of pets to return
          schema:
            type: integer
    post:
      summary: create a pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
  /pets/{id}:
    get:
      summary: get a pet by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
    delete:
      summary: delete a pet by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
